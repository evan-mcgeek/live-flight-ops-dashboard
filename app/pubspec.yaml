name: flight_ops_app
description: Live Flight Ops Dashboard — mobile frontend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  equatable: ^2.1.0
  get_it: ^9.2.1
  injectable: ^2.5.0
  go_router: ^17.3.0
  flutter_map: ^8.3.1
  latlong2: ^0.9.1
  dio: ^5.10.0
  signalr_netcore: ^1.4.4
  shared_preferences: ^2.5.5
  google_fonts: ^8.2.0
  flutter_svg: ^2.3.0
  json_annotation: ^4.9.0
  animated_flip_counter: ^0.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  build_runner: ^2.15.1
  injectable_generator: ^2.9.1
  json_serializable: ^6.9.5
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
